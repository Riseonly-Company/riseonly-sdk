name: publish-staging

on:
  push:
    branches: [staging]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: check publish state
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "@riseonly/sdk@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: skip already published version
        if: steps.check.outputs.published == 'true'
        run: |
          echo "@riseonly/sdk@${{ steps.check.outputs.version }} is already on npm"
          npm dist-tag add "@riseonly/sdk@${{ steps.check.outputs.version }}" next || true
      - name: publish next tag
        if: steps.check.outputs.published == 'false'
        run: npm publish --access public --tag next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
